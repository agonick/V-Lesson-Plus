name: Release on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create extension zip
        run: |
          zip -r "v-lesson-plus-v${{ steps.version.outputs.version }}.zip" \
            manifest.json \
            popup.html \
            popup.css \
            icons/ \
            dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "V-Lesson Plus v${{ steps.version.outputs.version }}"
          body: |
            Automated release for V-Lesson Plus v${{ steps.version.outputs.version }}.

            Download the zip below, unzip it, then load the folder as an unpacked extension in Chrome.
          files: "v-lesson-plus-v${{ steps.version.outputs.version }}.zip"
          make_latest: true
